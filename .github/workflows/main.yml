name: RepoPulse PR Analysis
on:
  pull_request:
    types: [opened, synchronize]


permissions:
  pull-requests: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./packages/github-action
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
