author: 'RepoPulse AI'
branding:
  icon: 'activity'
  color: 'blue'
inputs:
  github_token:
    description: 'GitHub Token for authentication'
    required: true
    default: ${{ github.token }}
runs:
  using: 'node20'
  main: 'packages/github-action/dist/index.js'
